name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: E2E Tests (${{ matrix.shard }})
    timeout-minutes: 360
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: 1/4
            shard-name: shard-1
          - shard: 2/4
            shard-name: shard-2
          - shard: 3/4
            shard-name: shard-3
          - shard: 4/4
            shard-name: shard-4

    env:
      VENDOR_PORTAL_BASE_URL: ${{ secrets.VENDOR_PORTAL_BASE_URL || 'https://partner.demo.dr.tmd1.org' }}
      VENDOR_PORTAL_USERNAME: ${{ secrets.VENDOR_PORTAL_USERNAME }}
      VENDOR_PORTAL_PASSWORD: ${{ secrets.VENDOR_PORTAL_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:ci -- --shard=${{ matrix.shard }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.shard-name }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: test-results-${{ matrix.shard-name }}
          path: test-results/
          retention-days: 14
