name: Daily Playwright System Run

on:
  schedule:
    # Runs every day at 2:00 AM Asia/Colombo time.
    # GitHub Actions schedules are in UTC, so 2:00 AM SLST = 8:30 PM UTC.
    - cron: '30 20 * * *'
  workflow_dispatch:

jobs:
  system-tests:
    name: Run full Playwright system tests
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      VENDOR_PORTAL_USERNAME: ${{ secrets.VENDOR_PORTAL_USERNAME }}
      VENDOR_PORTAL_PASSWORD: ${{ secrets.VENDOR_PORTAL_PASSWORD }}
      VENDOR_PORTAL_BASE_URL: ${{ secrets.VENDOR_PORTAL_BASE_URL || 'https://partner.demo.dr.tmd1.org' }}
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run full system test suite
        run: npm run test:all

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
